{% extends "base.html" %}
{% block content %}
<div class="text-center mb-5">
    <h1>Mis Proyectos</h1>
    <p class="lead">Explora mi trabajo como desarrollador</p>
</div>

<div class="d-flex justify-content-center mb-4">
    <a href="/" class="btn btn-outline-primary me-2">Todos</a>
    <a href="/?categoria=Machine Learning" class="btn btn-outline-primary me-2">ML</a>
    <a href="/?categoria=Web" class="btn btn-outline-primary me-2">Web</a>
</div>

<div class="row">
    {% for proyecto in proyectos %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm">
            <div class="card-body">
                <h5 class="card-title">{{ proyecto.titulo }}</h5>
                <span class="badge bg-info text-dark mb-2">{{ proyecto.categoria }}</span>
                <p class="card-text">{{ proyecto.descripcion }}</p>
                <a href="{{ proyecto.link }}" class="btn btn-dark btn-sm" target="_blank">Ver Código</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
