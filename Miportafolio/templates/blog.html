{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">Bitácora de Aprendizaje</h2>
<div class="row">
    {% for post in posts %}
    <div class="col-12 mb-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title">{{ post.titulo }}</h3>
                <p class="text-muted small">{{ post.fecha.strftime('%d/%m/%Y') }}</p>
                <p class="card-text">{{ post.contenido[:200] }}...</p>
                <a href="#" class="btn btn-link p-0">Leer más</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
